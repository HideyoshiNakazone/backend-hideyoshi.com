com:
  hideyoshi:
    frontEndPath: ${FRONT_END_PATH}
    frontEndConnectionType: ${FRONT_END_CONNECTION_TYPE}
security:
  require-ssl: true
server:
  error:
    include-stacktrace: on_param
  ssl:
    key-store: ${SSL_KEY_PATH}
    key-store-password: ${SSL_KEY_PASSWORD}
    key-password: ${SSL_KEY_PASSWORD}
    key-store-type: ${SSL_KEY_TYPE}
    key-alias: ${SSL_KEY_ALIAS}
  port: 443
spring:
  redis:
    host: ${REDIS_PATH}
    port: ${REDIS_PORT}
  session:
    store-type: redis
    persistent: true
    redis:
      flush-mode: on_save
      namespace: spring:session
  datasource:
    url: jdbc:${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      dialect: org.hibernate.dialect.PostgreSQL95Dialect
      format_sql: true
      ddl-auto: none
    show-sql: true
logging:
  level:
    org:
      hibernate:
        SQL: DEBUG